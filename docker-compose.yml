services:
  api:
    build: .
    container_name: prueba-tecnica-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_TYPE: sqlite
      DB_DATABASE: /app/data/app.db
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_EXPIRES_IN: 1h
      COINGECKO_BASE_URL: https://api.coingecko.com/api/v3
      COINGECKO_DEFAULT_VS_CURRENCY: usd
    volumes:
      - api-data:/app/data
    restart: unless-stopped

volumes:
  api-data:
